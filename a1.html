<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Goethe A1 — Kelime Antrenörü</title>
<style>
:root{
  --bg:#F7F3EE;--bg2:#EDE6DC;--ink:#1E1B26;--ink2:#5A5468;
  --plum:#7C4D8A;--plum2:#5E3469;--plum3:#EAD9EE;
  --gold:#B8862E;--ok:#3A7A53;--ok2:#D5EDE0;
  --err:#B04A28;--err2:#F5E0D8;--line:#D8D0C6;--r:14px;
}
*{box-sizing:border-box;margin:0;padding:0;}
body{background:var(--bg);color:var(--ink);font-family:'Segoe UI',system-ui,sans-serif;min-height:100vh;}
.wrap{max-width:900px;margin:0 auto;padding:24px 16px 80px;}

/* HEADER */
header{border-bottom:2.5px solid var(--ink);padding-bottom:16px;margin-bottom:20px;display:flex;align-items:flex-start;justify-content:space-between;gap:12px;}
.brand{font-size:10px;letter-spacing:.15em;text-transform:uppercase;color:var(--plum2);font-weight:700;margin-bottom:6px;}
h1{font-size:clamp(24px,5vw,38px);font-weight:800;letter-spacing:-.02em;line-height:1.05;}
.sub{color:var(--ink2);font-size:13.5px;margin-top:6px;max-width:50ch;line-height:1.5;}
.badge{flex-shrink:0;border:2.5px solid var(--plum);border-radius:50%;width:68px;height:68px;display:flex;align-items:center;justify-content:center;text-align:center;font-size:9px;font-weight:700;color:var(--plum);letter-spacing:.06em;line-height:1.3;transform:rotate(-8deg);}

/* DECKS */
.deck-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(140px,1fr));gap:8px;margin-bottom:20px;}
.deck-btn{background:#fff;border:1.5px solid var(--line);border-radius:var(--r);padding:11px 12px;text-align:left;cursor:pointer;font-family:inherit;transition:border-color .15s,transform .1s;}
.deck-btn:hover{border-color:var(--plum);transform:translateY(-1px);}
.deck-btn.active{border-color:var(--plum2);background:linear-gradient(135deg,#fff,var(--plum3));box-shadow:0 2px 0 var(--plum2);}
.dn{font-weight:700;font-size:13px;display:block;}
.dm{font-size:10px;color:var(--ink2);display:block;margin-top:4px;}
.dp{height:3px;border-radius:2px;background:var(--bg2);margin-top:7px;overflow:hidden;}
.dp span{display:block;height:100%;background:var(--ok);}

/* MODE BAR */
.modebar{display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:10px;margin-bottom:16px;}
.tabs{display:flex;gap:6px;flex-wrap:wrap;}
.tab{font-size:12px;font-weight:700;letter-spacing:.04em;text-transform:uppercase;padding:8px 14px;border-radius:999px;border:1.5px solid var(--line);background:#fff;cursor:pointer;color:var(--ink2);}
.tab.active{background:var(--ink);color:var(--bg);border-color:var(--ink);}
.sstat{font-size:11.5px;color:var(--ink2);}
.sstat b{color:var(--ink);}

/* STAGE */
#stage{min-height:340px;}

/* FLASHCARD */
.card-wrap{perspective:1200px;}
.fc{position:relative;min-height:280px;cursor:pointer;transform-style:preserve-3d;transition:transform .5s cubic-bezier(.2,.8,.2,1);}
.fc.flip{transform:rotateY(180deg);}
.face{position:absolute;inset:0;backface-visibility:hidden;border-radius:18px;border:1.5px solid var(--line);background:#fff;display:flex;flex-direction:column;align-items:center;justify-content:center;text-align:center;padding:32px 24px;box-shadow:0 12px 28px -16px rgba(30,27,38,.22);}
.face.back{transform:rotateY(180deg);background:linear-gradient(150deg,#fff,var(--plum3));}
.etag{font-size:10px;font-weight:700;letter-spacing:.12em;text-transform:uppercase;color:var(--plum);margin-bottom:12px;}
.deword{font-size:clamp(28px,6vw,44px);font-weight:800;line-height:1.05;letter-spacing:-.01em;}
.trword{font-size:clamp(22px,4.5vw,34px);font-weight:700;color:var(--plum2);margin-bottom:12px;}
.ex{font-size:15px;color:var(--ink2);font-style:italic;max-width:40ch;line-height:1.55;}
.hint{position:absolute;bottom:12px;font-size:10px;color:#C0B8CC;letter-spacing:.07em;text-transform:uppercase;}
.box-badge{position:absolute;top:14px;right:14px;font-size:10px;font-weight:700;color:var(--plum);background:var(--plum3);border-radius:999px;padding:3px 8px;}

/* CONTROLS */
.ctrl{display:flex;gap:10px;justify-content:center;margin-top:18px;flex-wrap:wrap;}
.btn{font-family:inherit;font-weight:700;font-size:14px;padding:12px 22px;border-radius:11px;border:none;cursor:pointer;transition:transform .1s,filter .12s;}
.btn:active{transform:scale(.97);}
.btn-no{background:var(--err2);color:var(--err);}
.btn-yes{background:var(--ok2);color:var(--ok);}
.btn-flip{background:var(--ink);color:var(--bg);}
.btn-next{background:var(--ink);color:var(--bg);}

/* QUIZ */
.qbox{background:#fff;border:1.5px solid var(--line);border-radius:18px;padding:30px 24px;text-align:center;box-shadow:0 12px 28px -16px rgba(30,27,38,.18);}
.qprompt{font-size:10px;font-weight:700;letter-spacing:.1em;text-transform:uppercase;color:var(--plum);margin-bottom:8px;}
.qword{font-size:clamp(26px,5vw,38px);font-weight:800;letter-spacing:-.01em;margin-bottom:22px;}
.opts{display:grid;grid-template-columns:1fr 1fr;gap:9px;}
@media(max-width:500px){.opts{grid-template-columns:1fr;}}
.opt{font-family:inherit;font-size:14.5px;font-weight:500;padding:13px 14px;border-radius:11px;border:1.5px solid var(--line);background:var(--bg);cursor:pointer;text-align:left;transition:border-color .12s;}
.opt:hover:not(:disabled){border-color:var(--plum);}
.opt.ok{background:var(--ok2);border-color:var(--ok);color:var(--ok);font-weight:700;}
.opt.err{background:var(--err2);border-color:var(--err);color:var(--err);}
.opt:disabled{cursor:default;}
.qnext{margin-top:18px;}

/* BLANK MODE */
.blankbox{background:#fff;border:1.5px solid var(--line);border-radius:18px;padding:30px 24px;text-align:center;box-shadow:0 12px 28px -16px rgba(30,27,38,.18);}
.bl-tag{font-size:10px;font-weight:700;letter-spacing:.1em;text-transform:uppercase;color:var(--gold);margin-bottom:10px;}
.bl-tr{font-size:18px;font-weight:700;color:var(--ink2);margin-bottom:6px;}
.bl-sent{font-size:17px;font-style:italic;line-height:1.6;margin-bottom:22px;color:var(--ink);}
.bl-sent b{color:var(--plum2);background:var(--plum3);border-radius:5px;padding:1px 6px;font-style:normal;}
.blank-input{display:inline-block;min-width:120px;border-bottom:2.5px solid var(--plum);font-size:17px;font-weight:700;color:var(--plum2);font-style:normal;padding:2px 8px;}

.empty{text-align:center;padding:50px 16px;color:var(--ink2);font-size:15px;}
.prog{font-size:11px;color:var(--ink2);text-align:center;margin-top:14px;letter-spacing:.03em;}

/* STATS BAR */
.statsbar{display:grid;grid-template-columns:repeat(5,1fr);gap:6px;margin-top:16px;}
.sbox{background:#fff;border:1.5px solid var(--line);border-radius:10px;padding:8px 6px;text-align:center;}
.sbox .sn{font-size:18px;font-weight:800;}
.sbox .sl{font-size:10px;color:var(--ink2);margin-top:2px;}

footer{margin-top:40px;padding-top:14px;border-top:1px solid var(--line);font-size:11.5px;color:#B8B0C2;text-align:center;}
</style>
</head>

// Normalize + build per-deck state
const ALL_DE = [];
DECKS.forEach(d=>{
  d.words = d.words.map(w=>({de:w[0],tr:w[1],ex:w[2]||''}));
  d.state = d.words.map(()=>({box:1}));
  d.words.forEach(w=>ALL_DE.push(w.de));
});
const TOTAL = DECKS.reduce((s,d)=>s+d.words.length,0);

// ── App state ──
let curDeck=0, mode='flash', queue=[], qPos=0, sRight=0, sSeen=0;

function shuffle(a){for(let i=a.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[a[i],a[j]]=[a[j],a[i]];}return a;}

function buildQueue(deck){
  let arr=[];
  deck.words.forEach((_,i)=>{
    const w=6-deck.state[i].box;
    for(let k=0;k<w;k++)arr.push(i);
  });
  return shuffle(arr);
}

function curIdx(){return queue[qPos%queue.length];}
function nextCard(){qPos++;if(qPos>=queue.length){queue=buildQueue(DECKS[curDeck]);qPos=0;}}

// ── Render deck grid ──
function renderDecks(){
  const g=document.getElementById('deckGrid');
  g.innerHTML='';
  DECKS.forEach((d,i)=>{
    const mastered=d.state.filter(s=>s.box>=4).length;
    const pct=Math.round(mastered/d.words.length*100);
    const b=document.createElement('button');
    b.className='deck-btn'+(i===curDeck?' active':'');
    b.innerHTML=`<span class="dn">${d.name}</span><span class="dm">${d.words.length} kelime</span><div class="dp"><span style="width:${pct}%"></span></div>`;
    b.onclick=()=>{curDeck=i;startSession();};
    g.appendChild(b);
  });
}

function renderStat(){
  document.getElementById('sstat').innerHTML=`Bu oturum: <b>${sSeen}</b> görüldü · <b>${sRight}</b> doğru`;
}

function renderBoxes(){
  const d=DECKS[curDeck];
  const boxes=[0,0,0,0,0];
  d.state.forEach(s=>boxes[s.box-1]++);
  const labels=['Kutu 1','Kutu 2','Kutu 3','Kutu 4','Kutu 5'];
  const bar=document.getElementById('statsbar');
  bar.innerHTML=boxes.map((n,i)=>`<div class="sbox"><div class="sn">${n}</div><div class="sl">${labels[i]}</div></div>`).join('');
}

function startSession(){
  const d=DECKS[curDeck];
  queue=buildQueue(d); qPos=0; sRight=0; sSeen=0;
  renderDecks(); renderStat(); renderBoxes();
  if(mode==='flash')renderFlash();
  else if(mode==='quiz')renderQuiz();
  else renderBlank();
}

// ── FLASH ──
function renderFlash(){
  const d=DECKS[curDeck];
  const idx=curIdx(); const w=d.words[idx]; const box=d.state[idx].box;
  document.getElementById('stage').innerHTML=`
    <div class="card-wrap">
      <div class="fc" id="fc">
        <div class="face front">
          <div class="box-badge">Kutu ${box}</div>
          <div class="etag">Almanca</div>
          <div class="deword">${w.de}</div>
          <div class="hint">Kartı çevirmek için tıkla</div>
        </div>
        <div class="face back">
          <div class="box-badge">Kutu ${box}</div>
          <div class="etag">Türkçe</div>
          <div class="trword">${w.tr}</div>
          ${w.ex?`<div class="ex">„${w.ex}"</div>`:''}
        </div>
      </div>
    </div>
    <div class="ctrl" id="fctl" style="visibility:hidden">
      <button class="btn btn-no" id="fno">✗ Bilmiyorum</button>
      <button class="btn btn-yes" id="fyes">✓ Biliyorum</button>
    </div>
    <p class="prog">${qPos+1} / ${queue.length}</p>`;
  const fc=document.getElementById('fc');
  let flipped=false;
  fc.onclick=()=>{flipped=!flipped;fc.classList.toggle('flip',flipped);document.getElementById('fctl').style.visibility=flipped?'visible':'hidden';};
  document.getElementById('fno').onclick=e=>{e.stopPropagation();answerFlash(idx,false);};
  document.getElementById('fyes').onclick=e=>{e.stopPropagation();answerFlash(idx,true);};
}
function answerFlash(idx,knew){
  const d=DECKS[curDeck]; const st=d.state[idx];
  sSeen++; if(knew){sRight++;st.box=Math.min(5,st.box+1);}else{st.box=1;}
  renderStat();renderBoxes();renderDecks();nextCard();renderFlash();
}

// ── QUIZ ──
function renderQuiz(){
  const d=DECKS[curDeck];
  if(d.words.length<4){document.getElementById('stage').innerHTML='<div class="empty">Test için en az 4 kelime gerekir.</div>';return;}
  const idx=curIdx(); const w=d.words[idx];
  let pool=d.words.map((_,i)=>i).filter(i=>i!==idx);
  shuffle(pool);
  const dis=pool.slice(0,3).map(i=>d.words[i].tr);
  const opts=shuffle([w.tr,...dis]);
  document.getElementById('stage').innerHTML=`
    <div class="qbox">
      <div class="qprompt">Türkçesi nedir?</div>
      <div class="qword">${w.de}</div>
      <div class="opts" id="qopts"></div>
      <div class="qnext" id="qnext" style="display:none">
        <button class="btn btn-next" id="qnextbtn">Sonraki →</button>
      </div>
    </div>
    <p class="prog">${qPos+1} / ${queue.length}</p>`;
  const optsEl=document.getElementById('qopts');
  opts.forEach(o=>{
    const b=document.createElement('button');
    b.className='opt'; b.textContent=o;
    b.onclick=()=>answerQuiz(idx,o,w.tr,b,optsEl);
    optsEl.appendChild(b);
  });
}
function answerQuiz(idx,chosen,correct,btn,optsEl){
  const d=DECKS[curDeck]; const st=d.state[idx];
  const knew=chosen===correct; sSeen++;
  if(knew){sRight++;st.box=Math.min(5,st.box+1);}else{st.box=1;}
  [...optsEl.children].forEach(b=>{b.disabled=true;if(b.textContent===correct)b.classList.add('ok');else if(b===btn)b.classList.add('err');});
  document.getElementById('qnext').style.display='block';
  document.getElementById('qnextbtn').onclick=()=>{nextCard();renderStat();renderBoxes();renderDecks();renderQuiz();};
  renderStat();renderBoxes();renderDecks();
}

// ── BLANK ──
function escRe(s){return s.replace(/[.*+?^${}()|[\]\\]/g,'\\$&');}
function makeBlank(sent,de){
  const root=de.replace(/^(sich\s+|der\s+|die\s+|das\s+|ein\s+|eine\s+|zum\s+|zur\s+)/gi,'').trim().split(/[\s,\/\(\)]/)[0];
  if(!root||root.length<2)return null;
  const rx1=new RegExp('\\b'+escRe(root)+'\\b','i');
  if(rx1.test(sent))return sent.replace(rx1,'<b class="blank-input">___</b>');
  if(root.length>=4){
    const rx2=new RegExp('\\b'+escRe(root.slice(0,4))+'\\w*','i');
    if(rx2.test(sent))return sent.replace(rx2,'<b class="blank-input">___</b>');
  }
  return null;
}
function renderBlank(){
  const d=DECKS[curDeck];
  if(d.words.length<4){document.getElementById('stage').innerHTML='<div class="empty">Boşluk modu için en az 4 kelime gerekir.</div>';return;}
  const idx=curIdx(); const w=d.words[idx];
  const blanked=w.ex?makeBlank(w.ex,w.de):null;
  let pool=d.words.map((_,i)=>i).filter(i=>i!==idx);
  shuffle(pool);
  const dis=pool.slice(0,3).map(i=>d.words[i].de);
  const opts=shuffle([w.de,...dis]);
  const promptHTML=blanked
    ?`<div class="bl-tag">Boşluğu doldur</div><div class="bl-tr">${w.tr}</div><div class="bl-sent">${blanked}</div>`
    :`<div class="bl-tag">Almancası nedir?</div><div class="bl-tr">${w.tr}</div><div class="bl-sent" style="color:var(--ink2);font-size:14px;">Doğru Almanca kelimeyi seç</div>`;
  document.getElementById('stage').innerHTML=`
    <div class="blankbox">
      ${promptHTML}
      <div class="opts" id="bopts"></div>
      <div class="qnext" id="bnext" style="display:none">
        <div id="bfeedback" style="margin-bottom:12px;font-size:14px;"></div>
        <button class="btn btn-next" id="bnextbtn">Sonraki →</button>
      </div>
    </div>
    <p class="prog">${qPos+1} / ${queue.length}</p>`;
  const optsEl=document.getElementById('bopts');
  opts.forEach(o=>{
    const b=document.createElement('button');
    b.className='opt'; b.textContent=o;
    b.onclick=()=>answerBlank(idx,o,w.de,b,optsEl,w.ex,w.tr);
    optsEl.appendChild(b);
  });
}
function answerBlank(idx,chosen,correct,btn,optsEl,ex,tr){
  const d=DECKS[curDeck]; const st=d.state[idx];
  const knew=chosen===correct; sSeen++;
  if(knew){sRight++;st.box=Math.min(5,st.box+1);}else{st.box=1;}
  [...optsEl.children].forEach(b=>{b.disabled=true;if(b.textContent===correct)b.classList.add('ok');else if(b===btn)b.classList.add('err');});
  const fb=document.getElementById('bfeedback');
  if(fb){
    fb.innerHTML=knew
      ?`<span style="color:var(--ok);font-weight:700;">✓ Doğru!</span>${ex?` <em style="color:var(--ink2)">"${ex}"</em>`:''}`
      :`<span style="color:var(--err);font-weight:700;">✗ Yanlış.</span> Doğrusu: <b>${correct}</b> — ${tr}`;
  }
  document.getElementById('bnext').style.display='block';
  document.getElementById('bnextbtn').onclick=()=>{nextCard();renderStat();renderBoxes();renderDecks();renderBlank();};
  renderStat();renderBoxes();renderDecks();
}

// ── TABS ──
document.querySelectorAll('.tab').forEach(t=>{
  t.onclick=()=>{
    document.querySelectorAll('.tab').forEach(x=>x.classList.remove('active'));
    t.classList.add('active'); mode=t.dataset.m;
    if(mode==='flash')renderFlash();
    else if(mode==='quiz')renderQuiz();
    else renderBlank();
  };
});

// ── INIT ──
document.querySelector('h1').textContent=`Kelime Antrenörü — ${TOTAL} Kelime`;
renderDecks(); startSession();
</script>
</body>
</html>
